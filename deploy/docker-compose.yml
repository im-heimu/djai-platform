services:
  backend:
    build:
      context: ../backend
    container_name: djai-backend
    environment:
      APP_NAME: ${APP_NAME:-DJAI Platform}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FUTURE_MODEL_ENDPOINT: ${FUTURE_MODEL_ENDPOINT:-}
    command: >
      uvicorn app.main:app
      --host ${BACKEND_HOST:-0.0.0.0}
      --port ${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"

  frontend:
    build:
      context: ../frontend
    container_name: djai-frontend
    depends_on:
      - backend
    environment:
      FRONTEND_HOST: ${FRONTEND_HOST:-0.0.0.0}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: >
      npm run dev --
      --host ${FRONTEND_HOST:-0.0.0.0}
      --port ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
